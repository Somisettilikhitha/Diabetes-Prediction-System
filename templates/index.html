<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Diabetes Predictor</title>

<link href="https://fonts.googleapis.com/css?family=Pacifico" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Arimo" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Hind:300" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="login">

<h1>Diabetes Predictor</h1>

<p class="subtitle">
Machine Learning Based Diabetes Risk Prediction System
</p>

<form action="{{ url_for('predict') }}" method="post">

<input type="text" name="Glucose Level" placeholder="Glucose Level" required>

<input type="text" name="Insulin" placeholder="Insulin" required>

<input type="text" name="BMI" placeholder="BMI" required>

<input type="text" name="Age" placeholder="Age" required>

<button type="submit" class="btn">Predict</button>

</form>

<div id="prediction" class="{{ color }}">

<p class="risk-title">
{{ message | safe }}: {{ risk_percent }}%
</p>

<p class="risk-advice">
{{ advice }}
</p>

</div>

{% if risk_percent %}
<div class="progress-container">
<div class="progress-bar" style="width: {{ risk_percent }}%">
{{ risk_percent }}%
</div>
</div>
{% endif %}

</div>

</body>
</html>
